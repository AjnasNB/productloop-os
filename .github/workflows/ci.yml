name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        node: [22.x, 24.x, 26.x]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
      - name: Setup tested npm CLI
        run: npm install --global npm@11.18.0 --ignore-scripts
      - name: Install workspace dependencies
        run: npm ci
      - name: Verify coordinated release metadata
        run: npm run test:release-metadata
      - name: Build
        run: npm run build
      - name: Test
        run: npm run test:workspaces
      - name: Typecheck
        run: npm run typecheck
      - name: Integration smoke test
        run: npm run integration
      - name: Clean consumer declaration test
        run: npm run test:consumer-types
      - name: Clean consumer Maqam 0.2.4 compatibility floor
        run: npm run test:consumer-types:maqam-floor
      - name: Audit complete dependency graph
        run: npm audit --audit-level=high
      - name: Audit production dependency graph
        run: npm audit --omit=dev --audit-level=high
      - name: Inspect publish contents
        run: npm run pack
